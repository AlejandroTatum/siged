# OpenSpec Configuration — SIGED
# Generated by sdd-init phase

project: siged
project_display_name: SIGED (Sistema de Gestión Educativa)
execution_mode: auto
artifact_store:
  mode: openspec
  root: openspec/
chained_pr_strategy: auto-forecast
review_budget: 400

# Stack
stack:
  backend: Django 4.x + Django REST Framework + SQLite + pytest-django
  frontend: Vite 6 + React 19 + TypeScript 5.7 + Tailwind CSS 4 + Vitest 2
  dev_harness: scripts/dev.sh

# Testing
testing:
  backend:
    runner: pytest
    command: cd siged/backend && .venv/bin/pytest --cov=apps
    coverage: true
    paths:
      - siged/backend/apps/core/tests/
      - siged/backend/apps/organizacion/tests/
  frontend:
    runner: vitest
    command: cd siged/frontend && npm test -- --coverage
    coverage: true
    layers:
      unit: true
      integration: true
      e2e: false
  quality:
    backend_linter: null
    backend_type_checker: null
    backend_formatter: null
    frontend_linter: null
    frontend_type_checker: cd siged/frontend && npm run build
    frontend_formatter: null

strict_tdd: true

# Convention files
conventions:
  - path: specs/
    description: Feature specs under specs/<feature-name>/spec.md
  - path: siged/backend/apps/core/
    description: Backend app with models, daos, servicios, apis structure

# SDD conventions
sdd:
  phases: [propose, spec, design, tasks, apply, verify, archive]
  model_assignments:
    explore: sonnet
    propose: opus
    spec: sonnet
    design: opus
    tasks: sonnet
    apply: sonnet
    verify: sonnet
    archive: haiku
    default: sonnet

# Active changes
changes: []
